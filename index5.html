<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAC 專業溝通板系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "aac-pro-v4";

        let currentUser = null;
        let allCategories = [];
        let selectedCategoryIds = [];
        let currentEditingCategory = null;
        let selectedSentence = [];
        let longPressTimer = null;
        let editSnapshotUnsubscribe = null;
        const synth = window.speechSynthesis;

        // --- 核心導覽 ---
        window.switchView = (viewId) => {
            document.querySelectorAll('.view-screen').forEach(v => v.classList.add('hidden'));
            const target = document.getElementById(viewId);
            if (target) target.classList.remove('hidden');
            
            if(viewId === 'categoryView') renderCategories();
            if(viewId === 'boardView') renderMainBoard();
        };

        window.speak = (text) => {
            if (synth.speaking) synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-TW';
            u.rate = 1.0;
            synth.speak(u);
        };

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // --- 初始化預設數據 ---
        const initDefaultData = async (uid) => {
            const defaults = [
                { name: "情緒", icon: "😊", color: "#dcfce7", cards: [{text:"開心", icon:"😊"}, {text:"生氣", icon:"😡"}, {text:"難過", icon:"😢"}] },
                { name: "家人", icon: "👨‍👩‍👧", color: "#dbeafe", cards: [{text:"爸爸", icon:"👨"}, {text:"媽媽", icon:"👩"}, {text:"奶奶", icon:"👵"}] },
                { name: "動作", icon: "🏃", color: "#ffedd5", cards: [{text:"吃", icon:"😋"}, {text:"喝", icon:"🥛"}, {text:"跑", icon:"🏃"}] },
                { name: "食物", icon: "🍱", color: "#fef9c3", cards: [{text:"飯", icon:"🍚"}, {text:"麵", icon:"🍜"}, {text:"餅乾", icon:"🍪"}] }
            ];
            
            for (let d of defaults) {
                const catRef = doc(collection(db, 'artifacts', appId, 'users', uid, 'categories'));
                await setDoc(catRef, { name: d.name, icon: d.icon, color: d.color, id: catRef.id });
                for (let c of d.cards) {
                    const cardRef = doc(collection(db, 'artifacts', appId, 'users', uid, 'categories', catRef.id, 'cards'));
                    await setDoc(cardRef, { ...c, id: cardRef.id });
                }
            }
        };

        // --- 介面渲染 ---
        const renderCategories = () => {
            const container = document.getElementById('categoryGrid');
            if (!container) return;
            container.innerHTML = '';
            
            allCategories.forEach(cat => {
                const isSelected = selectedCategoryIds.includes(cat.id);
                const div = document.createElement('div');
                div.className = `cat-card relative animate-pop ${isSelected ? 'ring-8 ring-blue-400 scale-105' : ''}`;
                div.style.backgroundColor = cat.color || '#ffffff';
                
                let iconHtml = cat.image ? `<img src="${cat.image}" class="w-24 h-24 object-contain">` : `<div class="text-6xl">${cat.icon || '📁'}</div>`;
                div.innerHTML = `<div class="text-2xl font-black mb-4">${cat.name}</div>${iconHtml}`;
                
                div.onpointerdown = (e) => {
                    div.dataset.lp = "false";
                    longPressTimer = setTimeout(() => {
                        div.dataset.lp = "true";
                        openEditCategory(cat);
                    }, 700);
                };
                div.onpointerup = () => {
                    clearTimeout(longPressTimer);
                    if(div.dataset.lp !== "true") toggleCategory(cat.id);
                };
                container.appendChild(div);
            });

            const addCard = document.createElement('div');
            addCard.className = "cat-card-add";
            addCard.innerHTML = `<div class="w-16 h-16 bg-yellow-400 rounded-full flex items-center justify-center text-4xl text-white mb-4 shadow-lg">＋</div><div class="text-xl font-black">新增類別</div>`;
            addCard.onclick = () => document.getElementById('addCategoryModal').style.display = 'flex';
            container.appendChild(addCard);

            renderSelectedBar();
        };

        const toggleCategory = (id) => {
            const idx = selectedCategoryIds.indexOf(id);
            if(idx > -1) selectedCategoryIds.splice(idx, 1);
            else selectedCategoryIds.push(id);
            renderCategories();
        };

        const renderSelectedBar = () => {
            const bar = document.getElementById('selectedBar');
            if (!bar) return;
            bar.innerHTML = '';
            selectedCategoryIds.forEach(id => {
                const cat = allCategories.find(c => c.id === id);
                if(!cat) return;
                const div = document.createElement('div');
                div.className = "h-16 px-6 bg-white border-4 border-black rounded-3xl flex items-center gap-3 cursor-pointer flex-shrink-0 animate-pop shadow-md";
                let iconHtml = cat.image ? `<img src="${cat.image}" class="w-10 h-10 object-contain">` : `<span class="text-2xl">${cat.icon}</span>`;
                div.innerHTML = `${iconHtml}<span class="font-black text-lg">${cat.name}</span>`;
                div.onclick = () => toggleCategory(id);
                bar.appendChild(div);
            });
        };

        const openEditCategory = async (cat) => {
            if (!currentUser) return;
            currentEditingCategory = cat;
            window.switchView('editCategoryView');
            
            const headerLabel = document.getElementById('editHeaderLabel');
            const headerIcon = document.getElementById('editHeaderIcon');
            const editView = document.getElementById('editCategoryView');

            if (headerLabel) headerLabel.innerText = cat.name;
            if (headerIcon) headerIcon.innerHTML = cat.image ? `<img src="${cat.image}" class="w-20 h-20 object-contain mx-auto">` : `<div class="text-6xl text-center">${cat.icon}</div>`;
            if (editView) editView.style.backgroundColor = (cat.color || '#ffffff') + '33'; 

            if(editSnapshotUnsubscribe) editSnapshotUnsubscribe();

            const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', cat.id, 'cards');
            editSnapshotUnsubscribe = onSnapshot(q, (snap) => {
                const grid = document.getElementById('editCardsGrid');
                if (!grid) return;
                grid.innerHTML = '';
                
                snap.docs.forEach(docSnap => {
                    const card = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "board-card h-52 w-48 animate-pop relative";
                    div.style.backgroundColor = cat.color || '#fff';
                    let iconHtml = card.image ? `<img src="${card.image}" class="w-24 h-24 object-contain">` : `<div class="text-5xl">${card.icon}</div>`;
                    div.innerHTML = `<div class="text-lg font-black">${card.text}</div>${iconHtml}`;
                    
                    div.onpointerdown = () => {
                        div.dataset.lp = "false";
                        longPressTimer = setTimeout(() => {
                            div.dataset.lp = "true";
                            if (confirm(`確定刪除「${card.text}」嗎？`)) deleteDoc(docSnap.ref);
                        }, 800);
                    };
                    div.onpointerup = () => clearTimeout(longPressTimer);
                    grid.appendChild(div);
                });

                const addBtn = document.createElement('div');
                addBtn.className = "cat-card-add h-52 w-48";
                addBtn.innerHTML = `<div class="w-14 h-14 bg-yellow-400 rounded-full flex items-center justify-center text-3xl text-white mb-2 shadow-md">＋</div><div class="font-black">新增字卡</div>`;
                addBtn.onclick = () => document.getElementById('addCardModal').style.display = 'flex';
                grid.appendChild(addBtn);
            });
        };

        const renderMainBoard = async () => {
            const grid = document.getElementById('boardGrid');
            if (!grid) return;
            grid.innerHTML = '<div class="col-span-10 text-center py-20 font-bold text-gray-400 text-2xl">準備中...</div>';
            
            let board = new Array(40).fill(null);
            const sys = [
                {text:"我", icon:"👧"}, {text:"要", icon:"☀️"}, {text:"不要", icon:"😌"},
                {text:"你", icon:"👦"}, {text:"是", icon:"⭕"}, {text:"不是", icon:"❌"},
                {text:"他", icon:"🧒"}, {text:"會", icon:"💡"}, {text:"不會", icon:"🤯"},
                {text:"老師", icon:"👩‍🏫"}, {text:"還要", icon:"☝️"}, {text:"等一下", icon:"🖐️"}
            ];
            let sP = 0;
            for(let r=0; r<4; r++) for(let c=0; c<3; c++) board[r*10+c] = sys[sP++];

            board[9] = { text:"添加", icon:"➕", type:"act", action: () => window.switchView('categoryView') };
            board[19] = { text:"告狀", icon:"☝️👩‍🏫", type:"act", action: () => window.speak("老師，我要告狀！") };
            board[29] = { text:"幫忙", icon:"🤝❤️", type:"act", action: () => window.speak("請幫幫我。") };
            board[39] = { text:"重設", icon:"⚙️", color: "#fce7f3", type:"act", action: () => { window.clearSentence(); window.speak("重設系統"); } };

            let currentCol = 3; 
            let currentRow = 0;

            for (let catId of selectedCategoryIds) {
                if (currentCol >= 9) break;
                const catInfo = allCategories.find(c => c.id === catId);
                if (!catInfo) continue;
                
                const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', catId, 'cards');
                const snap = await getDocs(q);
                const cards = snap.docs.map(d => ({ ...d.data(), color: catInfo.color }));

                cards.forEach(card => {
                    if (currentCol < 9) {
                        board[currentRow * 10 + currentCol] = card;
                        currentRow++;
                        if (currentRow >= 4) { currentRow = 0; currentCol++; }
                    }
                });
                if (currentRow !== 0) { currentRow = 0; currentCol++; }
            }

            grid.innerHTML = '';
            board.forEach(item => {
                const div = document.createElement('div');
                div.className = item ? "board-card-main animate-pop" : "board-empty";
                if(item) {
                    div.style.backgroundColor = item.color || '#fff';
                    let iconHtml = item.image ? `<img src="${item.image}" class="w-12 h-12 object-contain">` : `<div class="text-3xl">${item.icon || '❓'}</div>`;
                    div.innerHTML = `<div class="text-[10px] font-black">${item.text}</div>${iconHtml}`;
                    div.onclick = () => {
                        if(item.type === 'act') item.action();
                        else if(selectedSentence.length < 6) { 
                            selectedSentence.push(item); 
                            window.speak(item.text); 
                            renderSentence(); 
                        }
                    };
                }
                grid.appendChild(div);
            });
        };

        const renderSentence = () => {
            const box = document.getElementById('sentenceBox');
            if (!box) return;
            box.innerHTML = '';
            selectedSentence.forEach(item => {
                const div = document.createElement('div');
                div.className = "w-20 h-24 bg-white border-2 border-black rounded-2xl flex flex-col items-center justify-center flex-shrink-0 animate-pop shadow-md";
                let iconHtml = item.image ? `<img src="${item.image}" class="w-10 h-10 object-contain">` : `<div class="text-2xl">${item.icon}</div>`;
                div.innerHTML = `${iconHtml}<div class="text-xs font-bold mt-1">${item.text}</div>`;
                box.appendChild(div);
            });
        };

        // --- 字卡操作功能 ---
        window.removeLastCard = () => {
            selectedSentence.pop();
            renderSentence();
            // 清空 AI 分析建議
            const aiArea = document.getElementById('aiArea');
            if (aiArea) aiArea.classList.add('hidden');
        };

        window.clearSentence = () => {
            selectedSentence = [];
            renderSentence();
            // 清空 AI 分析建議
            const aiArea = document.getElementById('aiArea');
            if (aiArea) aiArea.classList.add('hidden');
            window.speak("清空");
        };

        // --- 存取邏輯 ---
        window.saveCategory = async () => {
            const name = document.getElementById('catName').value;
            const color = document.getElementById('catColor').value;
            const emoji = document.getElementById('catEmoji').value;
            const file = document.getElementById('catFile').files[0];
            if(!name || !currentUser) return alert("請輸入名稱");
            
            let imageData = null;
            if(file) imageData = await fileToBase64(file);

            const ref = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories'));
            await setDoc(ref, { name, color, icon: emoji, image: imageData, id: ref.id });
            window.closeModal('addCategoryModal');
        };

        window.saveCard = async () => {
            const text = document.getElementById('cardName').value;
            const emoji = document.getElementById('cardEmoji').value;
            const file = document.getElementById('cardFile').files[0];
            if(!text || !currentUser || !currentEditingCategory) return alert("請輸入名稱");

            let imageData = null;
            if(file) imageData = await fileToBase64(file);

            const ref = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', currentEditingCategory.id, 'cards'));
            await setDoc(ref, { text, icon: emoji, image: imageData, id: ref.id });
            window.closeModal('addCardModal');
        };

        window.closeModal = (id) => {
            const target = document.getElementById(id);
            if (target) target.style.display = 'none';
            document.querySelectorAll('input').forEach(i => i.value = '');
        };

        // AI 語句結構分析功能 (最新主、動、受分析邏輯)
        window.analyzeAI = async () => {
            if(selectedSentence.length === 0) return;
            const aiArea = document.getElementById('aiArea');
            const aiResult = document.getElementById('aiResult');
            if (aiArea) aiArea.classList.remove('hidden');
            if (aiResult) aiResult.innerText = "正在分析句子成分中...";

            const userText = selectedSentence.map(i => i.text).join('、');
            const apiKey = ""; 
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `輸入詞彙：${userText}` }] }],
                        systemInstruction: { parts: [{ text: "你是一位 AAC (輔助溝通) 專家。請分析使用者輸入的詞彙，判斷其在句子中缺少的成分（主詞、動詞、受詞）。請嚴格遵守以下格式：\n【分析】: 說明缺少了什麼成分，目前只有什麼。如果輸入詞彙可以有多種身分（例如既是主詞也是受詞），請一併說明。\n【完整句子】: 根據分析提供完整的例句。如果輸入詞彙有多種身分，請分別提供例句（例如：主詞：爸爸喝咖啡，受詞：我想爸爸）。限制在 60 字以內。" }] }
                    })
                });
                const data = await response.json();
                if (aiResult) {
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "無法分析語法結構。";
                    aiResult.innerText = resultText;
                }
            } catch (err) {
                if (aiResult) aiResult.innerText = "服務暫時不可用，請稍後再試。";
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const q = collection(db, 'artifacts', appId, 'users', user.uid, 'categories');
                onSnapshot(q, (snap) => {
                    allCategories = snap.docs.map(d => ({...d.data(), id: d.id}));
                    if(allCategories.length === 0) initDefaultData(user.uid);
                    else window.switchView('categoryView');
                });
            } else {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    signInAnonymously(auth);
                }
            }
        });

    </script>
    <style>
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.2s ease-out; }
        body { background-color: #fefce8; font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; height: 100vh; user-select: none; }
        .view-screen { position: fixed; inset: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        
        .cat-card { width: 230px; height: 290px; border: 6px solid #fff; border-radius: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 12px 0 rgba(0,0,0,0.05); touch-action: none; background: white; }
        .cat-card-add { width: 230px; height: 290px; border: 6px dashed #000; border-radius: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.4); transition: 0.2s; }
        .cat-card:active, .cat-card-add:active { transform: scale(0.95); }

        .board-card-main { border: 2px solid #000; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 8px; cursor: pointer; box-shadow: 3px 3px 0 #000; transition: 0.1s; background: #fff; }
        .board-card-main:active { transform: translate(2px, 2px); box-shadow: none; }
        .board-card { border: 5px solid #fff; border-radius: 35px; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 12px; cursor: pointer; box-shadow: 0 8px 0 rgba(0,0,0,0.05); touch-action: none; }

        .board-empty { border: 2px dashed #ccc; border-radius: 20px; opacity: 0.15; }
        .sentence-bar { background-color: #e5e7eb; border: 6px solid #9ca3af; border-radius: 45px; height: 140px; display: flex; align-items: center; padding: 0 25px; gap: 15px; flex-grow: 1; overflow-x: auto; box-shadow: inset 4px 4px 10px rgba(0,0,0,0.1); }
        .grid-10x4 { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(4, 1fr); gap: 15px; width: 100%; height: calc(100vh - 280px); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 40px; border-radius: 50px; width: 450px; border: 8px solid #facc15; }
        .home-btn { position: fixed; bottom: 35px; right: 35px; width: 80px; height: 80px; background: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4); cursor: pointer; color: white; font-size: 40px; z-index: 50; transition: 0.2s; border: 4px solid #fff; }
        .home-btn:active { transform: scale(0.9); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- 登入頁 -->
    <div id="loginView" class="view-screen">
        <h1 class="text-6xl font-black mb-16 text-blue-600 mt-20 drop-shadow-md">AAC 溝通板</h1>
        <button onclick="switchView('categoryView')" class="bg-blue-500 text-white px-16 py-7 rounded-[40px] font-black text-3xl shadow-2xl hover:bg-blue-600 active:scale-95 transition-all">進入系統</button>
    </div>

    <!-- 類別挑選頁 -->
    <div id="categoryView" class="view-screen hidden">
        <h2 class="text-5xl font-black mb-14 tracking-widest text-gray-800">挑 選 類 別</h2>
        <div class="flex items-center gap-8 w-full max-w-7xl">
            <button class="text-7xl text-blue-800 opacity-30">⬅️</button>
            <div id="categoryGrid" class="flex-grow flex gap-10 overflow-x-auto py-8 px-6 no-scrollbar"></div>
            <button class="text-7xl text-blue-800 opacity-30">➡️</button>
        </div>
        
        <div class="w-full max-w-6xl mt-12">
            <p class="text-2xl font-black mb-4 ml-8">已選類別：</p>
            <div class="w-full h-32 bg-gray-200 rounded-[50px] border-8 border-gray-400 flex items-center p-6 gap-6 relative shadow-inner">
                <div id="selectedBar" class="flex gap-6 overflow-x-auto no-scrollbar"></div>
                <button onclick="switchView('boardView')" class="absolute -right-8 bg-yellow-400 w-28 h-28 rounded-full flex items-center justify-center text-6xl shadow-2xl border-8 border-white transition-transform hover:scale-110 active:scale-90">➡️</button>
            </div>
        </div>
        <p class="mt-8 text-gray-400 font-bold">💡 提示：長按類別卡片可編輯內部字卡</p>
    </div>

    <!-- 編輯類別（新增字卡）頁 -->
    <div id="editCategoryView" class="view-screen hidden">
        <div class="flex flex-col items-center mb-10">
            <div id="editHeaderIcon" class="mb-2"></div>
            <h2 id="editHeaderLabel" class="text-4xl font-black">類別名稱</h2>
        </div>
        <div class="bg-white/40 p-10 rounded-[60px] border-8 border-white w-full max-w-7xl shadow-2xl flex-grow overflow-y-auto">
            <div id="editCardsGrid" class="flex flex-wrap justify-center gap-8"></div>
        </div>
        <div class="home-btn" onclick="switchView('categoryView')">🏠</div>
        <p class="fixed bottom-10 left-10 text-gray-500 font-bold">💡 提示：長按字卡可刪除</p>
    </div>

    <!-- 主溝通板頁 -->
    <div id="boardView" class="view-screen hidden">
        <div class="flex w-full gap-8 mb-8 max-w-[1400px] items-center relative">
            <!-- AI 機器人 -->
            <button onclick="window.analyzeAI()" class="w-28 h-28 bg-blue-100 rounded-full border-4 border-blue-400 text-6xl shadow-xl flex items-center justify-center hover:bg-blue-200 transition-colors">🤖</button>
            
            <div class="flex-grow flex flex-col">
                <!-- 語句顯示列 -->
                <div class="relative flex items-center">
                    <div id="sentenceBox" class="sentence-bar no-scrollbar pr-24"></div>
                    
                    <!-- 功能按鈕群 (參考截圖佈局) -->
                    <div class="absolute right-6 flex flex-col items-center gap-2">
                        <!-- 刪除單個 X -->
                        <button onclick="window.removeLastCard()" class="w-12 h-12 bg-red-500 text-white rounded-full text-3xl font-black flex items-center justify-center shadow-lg active:scale-90 border-2 border-white">✕</button>
                        
                        <div class="flex gap-2">
                            <!-- 發聲按鈕 -->
                            <button onclick="window.speak(selectedSentence.map(i=>i.text).join(''))" class="w-10 h-10 flex items-center justify-center text-4xl hover:scale-110 active:scale-90 transition-transform">🗣️</button>
                            <!-- 垃圾桶按鈕 (清空全部) -->
                            <button onclick="window.clearSentence()" class="w-10 h-10 flex items-center justify-center text-3xl hover:scale-110 active:scale-90 transition-transform grayscale">🗑️</button>
                        </div>
                    </div>
                </div>

                <!-- AI 分析結果區域 -->
                <div id="aiArea" class="hidden mt-2 p-3 bg-blue-50 border-2 border-blue-200 rounded-2xl text-blue-900 animate-pop">
                    <p class="font-black text-sm mb-1">🤖 AI 句子成分分析：</p>
                    <div id="aiResult" class="text-sm font-bold italic leading-relaxed whitespace-pre-wrap"></div>
                </div>
            </div>
        </div>
        
        <!-- 溝通字卡網格 -->
        <div id="boardGrid" class="grid-10x4 px-6 max-w-[1400px]"></div>
        
        <!-- 返回首頁按鈕 -->
        <div class="home-btn" onclick="switchView('categoryView')">🏠</div>
    </div>

    <!-- 新增類別 Modal -->
    <div id="addCategoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-3xl font-black mb-8 text-center text-yellow-600">🆕 新增類別</h2>
            <div class="space-y-6">
                <div>
                    <label class="block font-black mb-2">類別名稱</label>
                    <input id="catName" class="w-full p-4 bg-gray-100 rounded-2xl outline-none border-4 border-transparent focus:border-yellow-400">
                </div>
                <div>
                    <label class="block font-black mb-2">卡片顏色</label>
                    <input type="color" id="catColor" value="#ffffff" class="w-full h-16 rounded-2xl cursor-pointer">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-black mb-2">Emoji</label>
                        <input id="catEmoji" placeholder="🍎" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
                    </div>
                    <div>
                        <label class="block font-black mb-2">或 上傳圖片</label>
                        <input type="file" id="catFile" accept="image/*" class="w-full text-xs mt-2">
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal('addCategoryModal')" class="flex-1 py-4 bg-gray-200 rounded-2xl font-black">取消</button>
                    <button onclick="saveCategory()" class="flex-1 py-4 bg-yellow-400 text-white rounded-2xl font-black shadow-lg">確認新增</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增字卡 Modal -->
    <div id="addCardModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-3xl font-black mb-8 text-center text-blue-600">✨ 新增字卡</h2>
            <div class="space-y-6">
                <div>
                    <label class="block font-black mb-2">字卡名稱</label>
                    <input id="cardName" class="w-full p-4 bg-gray-100 rounded-2xl outline-none border-4 border-transparent focus:border-blue-400">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-black mb-2">Emoji</label>
                        <input id="cardEmoji" placeholder="🍪" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
                    </div>
                    <div>
                        <label class="block font-black mb-3">或 上傳圖片</label>
                        <input type="file" id="cardFile" accept="image/*" class="w-full text-xs mt-2">
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal('addCardModal')" class="flex-1 py-4 bg-gray-200 rounded-2xl font-black">取消</button>
                    <button onclick="saveCard()" class="flex-1 py-4 bg-blue-500 text-white rounded-2xl font-black shadow-lg">確認新增</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
