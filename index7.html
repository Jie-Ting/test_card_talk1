<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAC 專業溝通板系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "aac-pro-v5";

        let currentUser = null;
        let allCategories = [];
        let selectedCategoryIds = [];
        let currentEditingCategory = null;
        let selectedSentence = [];
        let longPressTimer = null;
        let editSnapshotUnsubscribe = null;
        const synth = window.speechSynthesis;

        // --- 核心導覽 ---
        window.switchView = (viewId) => {
            document.querySelectorAll('.view-screen').forEach(v => v.classList.add('hidden'));
            const target = document.getElementById(viewId);
            if (target) target.classList.remove('hidden');
            
            if(viewId === 'categoryView') renderCategories();
            if(viewId === 'boardView') renderMainBoard();
            if(viewId === 'reportView') renderReportBoard();
        };

        window.speak = (text) => {
            if (synth.speaking) synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-TW';
            u.rate = 1.0;
            synth.speak(u);
        };

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // --- 初始化預設數據 ---
        const initDefaultData = async (uid) => {
            const defaults = [
                { name: "情緒", icon: "😊", color: "#dcfce7", cards: [{text:"開心", icon:"😊"}, {text:"生氣", icon:"😡"}, {text:"難過", icon:"😢"}] },
                { name: "家人", icon: "👨‍👩‍👧", color: "#dbeafe", cards: [{text:"爸爸", icon:"👨"}, {text:"媽媽", icon:"👩"}, {text:"奶奶", icon:"👵"}] },
                { name: "動作", icon: "🏃", color: "#ffedd5", cards: [{text:"吃", icon:"😋"}, {text:"喝", icon:"🥛"}, {text:"跑", icon:"🏃"}] },
                { name: "食物", icon: "🍱", color: "#fef9c3", cards: [{text:"飯", icon:"🍚"}, {text:"麵", icon:"🍜"}, {text:"餅乾", icon:"🍪"}] },
                { name: "其他", icon: "📦", color: "#f3f4f6", cards: [] }
            ];
            
            for (let d of defaults) {
                const catRef = doc(collection(db, 'artifacts', appId, 'users', uid, 'categories'));
                await setDoc(catRef, { name: d.name, icon: d.icon, color: d.color, id: catRef.id });
                for (let c of d.cards) {
                    const cardRef = doc(collection(db, 'artifacts', appId, 'users', uid, 'categories', catRef.id, 'cards'));
                    await setDoc(cardRef, { ...c, id: cardRef.id });
                }
            }
        };

        // --- 介面渲染 ---
        const renderCategories = () => {
            const container = document.getElementById('categoryGrid');
            if (!container) return;
            container.innerHTML = '';
            
            allCategories.forEach(cat => {
                const isSelected = selectedCategoryIds.includes(cat.id);
                const div = document.createElement('div');
                div.className = `cat-card relative animate-pop flex-shrink-0 scroll-snap-center ${isSelected ? 'ring-8 ring-blue-400 scale-105' : ''}`;
                div.style.backgroundColor = cat.color || '#ffffff';
                
                let iconHtml = cat.image ? `<img src="${cat.image}" class="h-1/2 w-4/5 object-contain pointer-events-none">` : `<div class="text-8xl pointer-events-none">${cat.icon || '📁'}</div>`;
                div.innerHTML = `<div class="text-3xl font-black mb-4 pointer-events-none text-center px-2">${cat.name}</div>${iconHtml}`;
                
                div.onpointerdown = (e) => {
                    div.dataset.lp = "false";
                    longPressTimer = setTimeout(() => {
                        div.dataset.lp = "true";
                        openEditCategory(cat);
                    }, 700);
                };
                div.onpointerup = () => {
                    clearTimeout(longPressTimer);
                    if(div.dataset.lp !== "true") toggleCategory(cat.id);
                };
                container.appendChild(div);
            });

            const addCard = document.createElement('div');
            addCard.className = "cat-card-add flex-shrink-0 scroll-snap-center";
            addCard.innerHTML = `<div class="w-16 h-16 bg-yellow-400 rounded-full flex items-center justify-center text-4xl text-white mb-4 shadow-lg">＋</div><div class="text-2xl font-black">新增類別</div>`;
            addCard.onclick = () => document.getElementById('addCategoryModal').style.display = 'flex';
            container.appendChild(addCard);
        };

        const toggleCategory = (id) => {
            const idx = selectedCategoryIds.indexOf(id);
            if(idx > -1) selectedCategoryIds.splice(idx, 1);
            else selectedCategoryIds.push(id);
            renderSelectedBar();
            renderCategories();
        };

        const renderSelectedBar = () => {
            const bar = document.getElementById('selectedBar');
            if (!bar) return;
            bar.innerHTML = '';
            selectedCategoryIds.forEach(id => {
                const cat = allCategories.find(c => c.id === id);
                if(!cat) return;
                const div = document.createElement('div');
                div.className = "h-16 lg:h-20 px-6 bg-white border-4 border-black rounded-[2rem] flex items-center gap-3 cursor-pointer flex-shrink-0 animate-pop shadow-md";
                let iconHtml = cat.image ? `<img src="${cat.image}" class="w-10 h-10 lg:w-12 lg:h-12 object-contain">` : `<span class="text-3xl lg:text-4xl">${cat.icon}</span>`;
                div.innerHTML = `${iconHtml}<span class="font-black text-xl lg:text-2xl ml-2">${cat.name}</span>`;
                div.onclick = () => toggleCategory(id);
                bar.appendChild(div);
            });
        };

        const openEditCategory = async (cat) => {
            if (!currentUser) return;
            currentEditingCategory = cat;
            window.switchView('editCategoryView');
            
            const headerLabel = document.getElementById('editHeaderLabel');
            const headerIcon = document.getElementById('editHeaderIcon');
            const editView = document.getElementById('editCategoryView');

            if (headerLabel) headerLabel.innerText = cat.name;
            if (headerIcon) headerIcon.innerHTML = cat.image ? `<img src="${cat.image}" class="h-24 lg:h-32 w-24 lg:w-32 object-contain mx-auto">` : `<div class="text-7xl lg:text-9xl text-center">${cat.icon}</div>`;
            if (editView) editView.style.backgroundColor = (cat.color || '#ffffff') + '33'; 

            if(editSnapshotUnsubscribe) editSnapshotUnsubscribe();

            const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', cat.id, 'cards');
            editSnapshotUnsubscribe = onSnapshot(q, (snap) => {
                const grid = document.getElementById('editCardsGrid');
                if (!grid) return;
                grid.innerHTML = '';
                
                snap.docs.forEach(docSnap => {
                    const card = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "board-card h-48 w-40 lg:h-64 lg:w-56 animate-pop relative flex-shrink-0";
                    div.style.backgroundColor = cat.color || '#fff';
                    let iconHtml = card.image ? `<img src="${card.image}" class="h-3/5 w-4/5 object-contain">` : `<div class="text-6xl lg:text-8xl">${card.icon}</div>`;
                    div.innerHTML = `<div class="text-xl lg:text-3xl font-black mb-2">${card.text}</div>${iconHtml}`;
                    
                    div.onpointerdown = () => {
                        div.dataset.lp = "false";
                        longPressTimer = setTimeout(() => {
                            div.dataset.lp = "true";
                            if (confirm(`確定刪除「${card.text}」嗎？`)) deleteDoc(docSnap.ref);
                        }, 800);
                    };
                    div.onpointerup = () => clearTimeout(longPressTimer);
                    grid.appendChild(div);
                });

                const addBtn = document.createElement('div');
                addBtn.className = "cat-card-add h-48 w-40 lg:h-64 lg:w-56 flex-shrink-0";
                addBtn.innerHTML = `<div class="w-12 h-12 lg:w-20 lg:h-20 bg-yellow-400 rounded-full flex items-center justify-center text-4xl lg:text-6xl text-white mb-4 shadow-md">＋</div><div class="text-lg lg:text-3xl font-black text-center">新增字卡</div>`;
                addBtn.onclick = () => {
                    updateCategoryDropdown();
                    document.getElementById('targetCategory').value = cat.id;
                    document.getElementById('addCardModal').style.display = 'flex';
                };
                grid.appendChild(addBtn);
            });
        };

        const updateCategoryDropdown = () => {
            const select = document.getElementById('targetCategory');
            if (!select) return;
            select.innerHTML = '';
            allCategories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.innerText = cat.name;
                select.appendChild(opt);
            });
        };

        const renderMainBoard = async () => {
            const grid = document.getElementById('boardGrid');
            if (!grid) return;
            grid.innerHTML = '<div class="col-span-10 text-center py-20 font-bold text-gray-400 text-3xl italic">準備中...</div>';
            
            let board = new Array(40).fill(null);
            const sys = [
                {text:"我", icon:"👧"}, {text:"要", icon:"☀️"}, {text:"不要", icon:"😌"},
                {text:"你", icon:"👦"}, {text:"是", icon:"⭕"}, {text:"不是", icon:"❌"},
                {text:"他", icon:"🧒"}, {text:"會", icon:"💡"}, {text:"不會", icon:"🤯"},
                {text:"老師", icon:"👩‍🏫"}, {text:"還要", icon:"☝️"}, {text:"等一下", icon:"🖐️"}
            ];
            let sP = 0;
            for(let r=0; r<4; r++) for(let c=0; c<3; c++) board[r*10+c] = sys[sP++];

            board[9] = { text:"添加", icon:"＋", type:"act", action: () => {
                updateCategoryDropdown();
                document.getElementById('addCardModal').style.display = 'flex';
            }};
            board[19] = { text:"告狀", icon:"☝️👩‍🏫", type:"act", action: () => window.switchView('reportView') };
            board[29] = { text:"幫忙", icon:"🤝❤️", type:"act", action: () => window.speak("請幫幫我。") };
            board[39] = { text:"重設", icon:"⚙️", color: "#fce7f3", type:"act", action: () => { window.clearSentence(); window.speak("重設系統"); } };

            let currentCol = 3; 
            let currentRow = 0;

            for (let catId of selectedCategoryIds) {
                if (currentCol >= 9) break;
                const catInfo = allCategories.find(c => c.id === catId);
                if (!catInfo) continue;
                
                const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', catId, 'cards');
                const snap = await getDocs(q);
                const cards = snap.docs.map(d => ({ ...d.data(), color: catInfo.color }));

                cards.forEach(card => {
                    if (currentCol < 9) {
                        board[currentRow * 10 + currentCol] = card;
                        currentRow++;
                        if (currentRow >= 4) { currentRow = 0; currentCol++; }
                    }
                });
                if (currentRow !== 0) { currentRow = 0; currentCol++; }
            }

            drawBoard(grid, board);
        };

        // --- 新增：告狀頁面渲染 ---
        const renderReportBoard = () => {
            const grid = document.getElementById('reportBoardGrid');
            if (!grid) return;
            grid.innerHTML = '';
            let board = new Array(40).fill(null);

            // 1. 人物 (左)
            const people = [
                {text:"我", icon:"👧", color:"#f9f5eb"},
                {text:"你", icon:"👦", color:"#f9f5eb"},
                {text:"他", icon:"🧒", color:"#f9f5eb"},
                {text:"老師", icon:"👩‍🏫", color:"#f9f5eb"}
            ];
            people.forEach((p, i) => board[i*10] = p);

            // 2. 動作 (中) - 踢、撞、打、罵、捏、抓、拿、搶
            const actions = [
                {text:"踢", icon:"🦵", color:"#fbcfe8"}, {text:"撞", icon:"💥", color:"#fbcfe8"},
                {text:"打", icon:"👊", color:"#fbcfe8"}, {text:"罵", icon:"🤬", color:"#fbcfe8"},
                {text:"捏", icon:"🤏", color:"#fbcfe8"}, {text:"抓", icon:"🐾", color:"#fbcfe8"},
                {text:"拿", icon:"🤲", color:"#fbcfe8"}, {text:"搶", icon:"👐", color:"#fbcfe8"}
            ];
            actions.forEach((a, i) => {
                const col = i < 4 ? 4 : 5;
                const row = i % 4;
                board[row * 10 + col] = a;
            });

            // 3. 感覺 (右)
            const feelings = [
                {text:"覺得", icon:"💭", color:"#dcfce7"},
                {text:"討厭", icon:"😤", color:"#dcfce7"},
                {text:"生氣", icon:"😡", color:"#dcfce7"},
                {text:"難過", icon:"😢", color:"#dcfce7"}
            ];
            feelings.forEach((f, i) => board[i*10 + 7] = f);

            // 4. 功能
            board[9] = { text:"添加", icon:"＋", type:"act", action: () => {
                updateCategoryDropdown();
                document.getElementById('addCardModal').style.display = 'flex';
            }};
            
            drawBoard(grid, board);
        };

        const drawBoard = (container, board) => {
            container.innerHTML = '';
            board.forEach(item => {
                const div = document.createElement('div');
                div.className = item ? "board-card-main animate-pop" : "board-empty";
                if(item) {
                    div.style.backgroundColor = item.color || '#fff';
                    let iconHtml = item.image ? `<img src="${item.image}" class="h-2/3 w-4/5 object-contain">` : `<div class="text-3xl lg:text-5xl">${item.icon || '❓'}</div>`;
                    div.innerHTML = `<div class="text-sm lg:text-2xl font-black truncate w-full text-center mb-1 leading-tight text-gray-800">${item.text}</div>${iconHtml}`;
                    div.onclick = () => {
                        if(item.type === 'act') item.action();
                        else if(selectedSentence.length < 15) { 
                            selectedSentence.push(item); 
                            window.speak(item.text); 
                            updateAllSentenceBars(); 
                        }
                    };
                }
                container.appendChild(div);
            });
        };

        const updateAllSentenceBars = () => {
            const boxes = document.querySelectorAll('.sentence-bar');
            boxes.forEach(box => {
                box.innerHTML = '';
                selectedSentence.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "w-20 h-24 lg:w-28 lg:h-32 bg-white border-4 border-black rounded-[1.5rem] flex flex-col items-center justify-center flex-shrink-0 animate-pop shadow-md";
                    let iconHtml = item.image ? `<img src="${item.image}" class="w-12 h-12 lg:w-16 lg:h-16 object-contain">` : `<div class="text-4xl lg:text-5xl">${item.icon}</div>`;
                    div.innerHTML = `${iconHtml}<div class="text-base lg:text-xl font-bold mt-1 text-center truncate w-full px-2">${item.text}</div>`;
                    box.appendChild(div);
                });
            });
        };

        window.removeLastCard = () => {
            selectedSentence.pop();
            updateAllSentenceBars();
            document.querySelectorAll('.ai-area').forEach(a => a.classList.add('hidden'));
        };

        window.clearSentence = () => {
            selectedSentence = [];
            updateAllSentenceBars();
            document.querySelectorAll('.ai-area').forEach(a => a.classList.add('hidden'));
            window.speak("清空");
        };

        window.saveCategory = async () => {
            const name = document.getElementById('catName').value;
            const color = document.getElementById('catColor').value;
            const emoji = document.getElementById('catEmoji').value;
            const file = document.getElementById('catFile').files[0];
            if(!name || !currentUser) return alert("請輸入名稱");
            let imageData = null;
            if(file) imageData = await fileToBase64(file);
            const ref = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories'));
            await setDoc(ref, { name, color, icon: emoji, image: imageData, id: ref.id });
            window.closeModal('addCategoryModal');
        };

        window.saveCard = async () => {
            const text = document.getElementById('cardName').value;
            const emoji = document.getElementById('cardEmoji').value;
            const catId = document.getElementById('targetCategory').value;
            const file = document.getElementById('cardFile').files[0];
            if(!text || !currentUser || !catId) return alert("請輸入名稱並選擇類別");
            let imageData = null;
            if(file) imageData = await fileToBase64(file);
            const ref = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', catId, 'cards'));
            await setDoc(ref, { text, icon: emoji, image: imageData, id: ref.id });
            window.closeModal('addCardModal');
            // 即時重繪當前視圖
            if(!document.getElementById('boardView').classList.contains('hidden')) renderMainBoard();
            if(!document.getElementById('reportView').classList.contains('hidden')) renderReportBoard();
        };

        window.closeModal = (id) => {
            const target = document.getElementById(id);
            if (target) target.style.display = 'none';
            document.querySelectorAll('input').forEach(i => { if(i.type !== 'color') i.value = ''; });
        };

        window.analyzeAI = async () => {
            if(selectedSentence.length === 0) return;
            const aiAreas = document.querySelectorAll('.ai-area');
            const aiResults = document.querySelectorAll('.ai-result');
            aiAreas.forEach(a => a.classList.remove('hidden'));
            aiResults.forEach(r => r.innerText = "專家正在分析您的語句並產出建議...");

            const userText = selectedSentence.map(i => i.text).join('、');
            const apiKey = ""; 
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `輸入詞彙：${userText}` }] }],
                        systemInstruction: { parts: [{ text: "你是一位 AAC 專家。分析缺失成分（主詞、動詞、受詞）。格式：【分析】: 說明缺失 \n【完整句子】: 提供完整的例句。最多 2 句。如果是衝突描述請強調主客體關係。限制在 100 字內。" }] }
                    })
                });
                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "暫時無法分析建議。";
                aiResults.forEach(r => r.innerText = text);
            } catch (err) {
                aiResults.forEach(r => r.innerText = "服務暫時不可用，請稍後再試。");
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const q = collection(db, 'artifacts', appId, 'users', user.uid, 'categories');
                onSnapshot(q, (snap) => {
                    allCategories = snap.docs.map(d => ({...d.data(), id: d.id}));
                    if(allCategories.length === 0) initDefaultData(user.uid);
                    else window.switchView('categoryView');
                });
            } else {
                signInAnonymously(auth);
            }
        });
    </script>
    <style>
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.2s ease-out; }
        body { background-color: #fefce8; font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; height: 100vh; user-select: none; }
        .view-screen { position: absolute; inset: 0; padding: 2vh; display: flex; flex-direction: column; align-items: center; height: 100vh; width: 100vw; box-sizing: border-box; }
        
        .category-scroll-container { width: 100%; flex-grow: 1; display: flex; flex-direction: row; align-items: center; justify-content: flex-start; overflow-x: auto; scroll-snap-type: x mandatory; padding: 0 40px; scroll-behavior: smooth; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
        .cat-card, .cat-card-add { flex-shrink: 0; scroll-snap-align: center; margin: 0 20px; }

        .cat-card { width: 280px; height: 50vh; max-height: 450px; border: 8px solid #fff; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 0 rgba(0,0,0,0.05); background: white; }
        .cat-card-add { width: 280px; height: 50vh; max-height: 450px; border: 8px dashed #000; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.4); }

        .board-card-main { border: 3px solid #000; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; cursor: pointer; box-shadow: 3px 3px 0 #000; transition: 0.1s; background: #fff; height: 100%; width: 100%; box-sizing: border-box; overflow: hidden; }
        .board-card-main:active { transform: translate(2px, 2px); box-shadow: none; }
        .board-empty { border: 2px dashed #ccc; border-radius: 15px; opacity: 0.15; height: 100%; width: 100%; }
        
        .sentence-bar { background-color: #e5e7eb; border: 6px solid #9ca3af; border-radius: 40px; height: 16vh; min-height: 120px; display: flex; align-items: center; padding: 0 20px; gap: 15px; flex-grow: 1; overflow-x: auto; box-shadow: inset 4px 4px 10px rgba(0,0,0,0.1); }
        .grid-10x4 { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1vh; width: 100%; flex-grow: 1; margin-top: 1vh; max-width: 1600px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 40px; width: 90%; max-width: 500px; border: 10px solid #facc15; }
        
        .home-btn { position: fixed; bottom: 3vh; right: 3vh; width: 100px; height: 100px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 50; transition: 0.2s; border: 5px solid #fff; box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4); }
        .home-btn:active { transform: scale(0.9); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <!-- 登入頁 -->
    <div id="loginView" class="view-screen flex justify-center">
        <h1 class="text-6xl lg:text-8xl font-black mb-12 text-blue-600 drop-shadow-xl text-center">AAC 溝通板</h1>
        <button onclick="switchView('categoryView')" class="bg-blue-500 text-white px-16 py-8 rounded-[4rem] font-black text-4xl lg:text-5xl shadow-2xl hover:bg-blue-600 active:scale-95 transition-all">點擊進入系統</button>
    </div>

    <!-- 類別挑選頁 -->
    <div id="categoryView" class="view-screen hidden">
        <h2 class="text-5xl lg:text-6xl font-black mb-6 tracking-widest text-gray-800">挑 選 類 別</h2>
        <div id="categoryGrid" class="category-scroll-container no-scrollbar"></div>
        <div class="w-full max-w-6xl mt-4 pb-20">
            <p class="text-2xl font-black mb-2 ml-8 text-gray-700">已選類別：</p>
            <div class="w-full h-28 lg:h-32 bg-gray-200 rounded-[4rem] border-[8px] border-gray-400 flex items-center p-6 gap-6 relative shadow-inner">
                <div id="selectedBar" class="flex gap-6 overflow-x-auto no-scrollbar"></div>
                <button onclick="switchView('boardView')" class="absolute -right-8 bg-yellow-400 w-28 h-28 lg:w-32 lg:h-32 rounded-full flex items-center justify-center text-6xl lg:text-7xl shadow-2xl border-[8px] border-white transition-transform hover:scale-110 active:scale-90">➡️</button>
            </div>
        </div>
    </div>

    <!-- 編輯頁 -->
    <div id="editCategoryView" class="view-screen hidden">
        <div class="flex flex-col items-center mb-6">
            <div id="editHeaderIcon" class="mb-2"></div>
            <h2 id="editHeaderLabel" class="text-5xl font-black text-gray-800">類別</h2>
        </div>
        <div class="bg-white/40 p-8 rounded-[4rem] border-8 border-white w-full max-w-[95vw] shadow-2xl flex-grow overflow-y-auto">
            <div id="editCardsGrid" class="flex flex-wrap justify-center gap-8 pb-10"></div>
        </div>
        <div class="home-btn bg-red-500 text-white" onclick="switchView('categoryView')">
            <span class="text-4xl">🏠</span>
            <span class="text-sm font-bold">主頁</span>
        </div>
    </div>

    <!-- 主溝通板頁 -->
    <div id="boardView" class="view-screen hidden overflow-hidden">
        <div class="flex w-full gap-6 mb-4 max-w-[1600px] items-start relative h-[25vh] flex-shrink-0">
            <button onclick="window.analyzeAI()" class="w-28 h-28 lg:w-32 lg:h-32 bg-blue-100 rounded-full border-4 border-blue-400 text-6xl lg:text-7xl shadow-xl flex items-center justify-center hover:bg-blue-200 transition-colors flex-shrink-0">🤖</button>
            <div class="flex-grow flex flex-col h-full overflow-hidden">
                <div class="relative flex items-center h-full">
                    <div class="sentence-bar no-scrollbar pr-40"></div>
                    <div class="absolute right-6 flex flex-col items-center gap-2">
                        <button onclick="window.removeLastCard()" class="w-12 h-12 lg:w-14 lg:h-14 bg-red-500 text-white rounded-full text-3xl font-black flex items-center justify-center shadow-lg border-4 border-white">✕</button>
                        <div class="flex gap-2">
                            <button onclick="window.speak(selectedSentence.map(i=>i.text).join(''))" class="w-10 h-10 lg:w-12 lg:h-12 flex items-center justify-center text-4xl lg:text-5xl">🗣️</button>
                            <button onclick="window.clearSentence()" class="w-10 h-10 lg:w-12 lg:h-12 flex items-center justify-center text-3xl lg:text-4xl grayscale">🗑️</button>
                        </div>
                    </div>
                </div>
                <div class="ai-area hidden mt-2 p-3 bg-white border-2 border-blue-400 rounded-3xl text-blue-900 animate-pop shadow-xl overflow-y-auto max-h-[10vh]">
                    <p class="font-black text-sm lg:text-base">🤖 建議： <span class="ai-result font-bold italic"></span></p>
                </div>
            </div>
        </div>
        <div id="boardGrid" class="grid-10x4"></div>
        <div class="home-btn bg-red-500 text-white" onclick="switchView('categoryView')">
            <span class="text-4xl">🏠</span>
            <span class="text-sm font-bold">主頁</span>
        </div>
    </div>

    <!-- 告狀專用頁面 -->
    <div id="reportView" class="view-screen hidden overflow-hidden">
        <div class="flex w-full gap-6 mb-4 max-w-[1600px] items-start relative h-[25vh] flex-shrink-0">
            <button onclick="window.analyzeAI()" class="w-28 h-28 lg:w-32 lg:h-32 bg-blue-100 rounded-full border-4 border-blue-400 text-6xl lg:text-7xl shadow-xl flex items-center justify-center hover:bg-blue-200 transition-colors flex-shrink-0">🤖</button>
            <div class="flex-grow flex flex-col h-full overflow-hidden">
                <div class="relative flex items-center h-full">
                    <div class="sentence-bar no-scrollbar pr-40"></div>
                    <div class="absolute right-6 flex flex-col items-center gap-2">
                        <button onclick="window.removeLastCard()" class="w-12 h-12 lg:w-14 lg:h-14 bg-red-500 text-white rounded-full text-3xl font-black flex items-center justify-center shadow-lg border-4 border-white">✕</button>
                        <div class="flex gap-2">
                            <button onclick="window.speak(selectedSentence.map(i=>i.text).join(''))" class="w-10 h-10 lg:w-12 lg:h-12 flex items-center justify-center text-4xl lg:text-5xl">🗣️</button>
                            <button onclick="window.clearSentence()" class="w-10 h-10 lg:w-12 lg:h-12 flex items-center justify-center text-3xl lg:text-4xl grayscale">🗑️</button>
                        </div>
                    </div>
                </div>
                <div class="ai-area hidden mt-2 p-3 bg-white border-2 border-blue-400 rounded-3xl text-blue-900 animate-pop shadow-xl overflow-y-auto max-h-[10vh]">
                    <p class="font-black text-sm lg:text-base">🤖 建議： <span class="ai-result font-bold italic"></span></p>
                </div>
            </div>
        </div>
        
        <div id="reportBoardGrid" class="grid-10x4"></div>
        
        <div class="home-btn bg-red-500 text-white" onclick="switchView('categoryView')">
            <span class="text-4xl">🏠</span>
            <span class="text-sm font-bold">主頁</span>
        </div>
    </div>

    <!-- 彈窗內容維持不變 -->
    <div id="addCategoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-3xl font-black mb-6 text-center text-yellow-600">🆕 新增類別</h2>
            <div class="space-y-4">
                <input id="catName" placeholder="名稱" class="w-full p-4 bg-gray-100 rounded-2xl text-xl outline-none focus:ring-4 ring-yellow-400">
                <input type="color" id="catColor" value="#ffffff" class="w-full h-16 rounded-xl cursor-pointer">
                <div class="flex gap-4">
                    <input id="catEmoji" placeholder="Emoji 🍎" class="w-1/2 p-4 bg-gray-100 rounded-xl text-xl">
                    <input type="file" id="catFile" class="w-1/2 mt-2">
                </div>
                <div class="flex gap-4 pt-6">
                    <button onclick="closeModal('addCategoryModal')" class="flex-1 py-4 bg-gray-200 rounded-xl font-black">取消</button>
                    <button onclick="saveCategory()" class="flex-1 py-4 bg-yellow-400 text-white rounded-xl font-black">確定</button>
                </div>
            </div>
        </div>
    </div>

    <div id="addCardModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-3xl font-black mb-6 text-center text-blue-600">✨ 新增字卡</h2>
            <div class="space-y-4">
                <input id="cardName" placeholder="字卡文字" class="w-full p-4 bg-gray-100 rounded-2xl text-xl outline-none focus:ring-4 ring-blue-400">
                <div class="flex flex-col gap-1">
                    <label class="font-bold text-gray-500">選擇類別：</label>
                    <select id="targetCategory" class="w-full p-3 bg-gray-100 rounded-xl text-xl outline-none border-2 border-gray-200 focus:border-blue-400"></select>
                </div>
                <div class="flex gap-4">
                    <input id="cardEmoji" placeholder="Emoji 🍪" class="w-1/2 p-4 bg-gray-100 rounded-xl text-xl">
                    <input type="file" id="cardFile" class="w-1/2 mt-2">
                </div>
                <div class="flex gap-4 pt-6">
                    <button onclick="closeModal('addCardModal')" class="flex-1 py-4 bg-gray-200 rounded-xl font-black">取消</button>
                    <button onclick="saveCard()" class="flex-1 py-4 bg-blue-500 text-white rounded-xl font-black">確定新增</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
