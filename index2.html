<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAC 專業溝通板系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1d_9Phv2EhvishA7pm2QoLihm8sw6x2Y",
            authDomain: "testcard-7c32d.firebaseapp.com",
            projectId: "testcard-7c32d",
            storageBucket: "testcard-7c32d.firebasestorage.app",
            messagingSenderId: "457469361983",
            appId: "1:457469361983:web:d61b6b5d8ece4d235add8a"
        };

        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // 核心修正：確保使用正確的 appId 以符合安全規則
        const appId = typeof __app_id !== 'undefined' ? __app_id : "aac-pro-v3";

        let currentUser = null;
        let allCategories = [];
        let selectedCategoryIds = [];
        let currentEditingCategory = null;
        let selectedSentence = [];
        let longPressTimer = null;
        let editSnapshotUnsubscribe = null;
        const synth = window.speechSynthesis;

        window.switchView = (viewId) => {
            document.querySelectorAll('.view-screen').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'categoryView') renderCategories();
            if(viewId === 'boardView') renderMainBoard();
        };

        window.speak = (text) => {
            if (synth.speaking) synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-TW';
            synth.speak(u);
        };

        const initDefaultData = async (uid) => {
            console.log("Initializing default data for user:", uid);
            const defaults = [
                { name: "情緒", icon: "😊", color: "#ecfdf5", cards: [{text:"開心", icon:"😊"}, {text:"生氣", icon:"😡"}, {text:"難過", icon:"😢"}] },
                { name: "家人", icon: "👨‍👩‍👧", color: "#eff6ff", cards: [{text:"爸爸", icon:"👨‍🏫"}, {text:"媽媽", icon:"👩"}, {text:"奶奶", icon:"👵"}] },
                { name: "動作", icon: "🏃", color: "#fff7ed", cards: [{text:"吃", icon:"👦🍱"}, {text:"喝", icon:"🥛"}, {text:"跑", icon:"🏃"}] },
                { name: "食物", icon: "🍱", color: "#fefce8", cards: [{text:"飯", icon:"🍚"}, {text:"麵", icon:"🍜"}, {text:"餅乾", icon:"🍪"}] }
            ];
            
            try {
                for (let d of defaults) {
                    const catRef = doc(collection(db, 'artifacts', appId, 'users', uid, 'categories'));
                    await setDoc(catRef, { name: d.name, icon: d.icon, color: d.color, id: catRef.id });
                    for (let c of d.cards) {
                        const cardRef = doc(collection(db, 'artifacts', appId, 'users', uid, 'categories', catRef.id, 'cards'));
                        await setDoc(cardRef, { ...c, id: cardRef.id });
                    }
                }
            } catch (e) {
                console.error("Initialization failed:", e);
            }
        };

        const renderCategories = () => {
            const container = document.getElementById('categoryGrid');
            container.innerHTML = '';
            allCategories.forEach(cat => {
                const isSelected = selectedCategoryIds.includes(cat.id);
                const div = document.createElement('div');
                div.className = `cat-card ${isSelected ? 'ring-4 ring-blue-500 scale-105' : ''}`;
                div.style.backgroundColor = cat.color;
                div.innerHTML = `<div class="text-xl font-black mb-2">${cat.name}</div><div class="text-5xl">${cat.icon}</div>`;
                
                div.onpointerdown = () => {
                    div.dataset.lp = "false";
                    longPressTimer = setTimeout(() => {
                        div.dataset.lp = "true";
                        openEditCategory(cat);
                    }, 700);
                };
                div.onpointerup = () => {
                    clearTimeout(longPressTimer);
                    if(div.dataset.lp !== "true") toggleCategory(cat.id);
                };
                container.appendChild(div);
            });
            renderSelectedBar();
        };

        const toggleCategory = (id) => {
            const idx = selectedCategoryIds.indexOf(id);
            if(idx > -1) selectedCategoryIds.splice(idx, 1);
            else selectedCategoryIds.push(id);
            renderCategories();
        };

        const renderSelectedBar = () => {
            const bar = document.getElementById('selectedBar');
            bar.innerHTML = '';
            selectedCategoryIds.forEach(id => {
                const cat = allCategories.find(c => c.id === id);
                if(!cat) return;
                const div = document.createElement('div');
                div.className = "h-16 px-4 bg-white border-2 border-black rounded-2xl flex items-center gap-2 cursor-pointer flex-shrink-0";
                div.innerHTML = `<span>${cat.icon}</span><span class="font-bold">${cat.name}</span>`;
                div.onclick = () => toggleCategory(id);
                bar.appendChild(div);
            });
        };

        const openEditCategory = async (cat) => {
            if (!currentUser) return;
            currentEditingCategory = cat;
            window.switchView('editCategoryView');
            document.getElementById('editTitle').innerText = `編輯：${cat.name}`;
            
            if(editSnapshotUnsubscribe) editSnapshotUnsubscribe();

            const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', cat.id, 'cards');
            editSnapshotUnsubscribe = onSnapshot(q, (snap) => {
                const grid = document.getElementById('editCardsGrid');
                grid.innerHTML = '';
                snap.docs.forEach(doc => {
                    const card = doc.data();
                    const div = document.createElement('div');
                    div.className = "edit-card-item";
                    div.style.backgroundColor = cat.color;
                    div.innerHTML = `<div class="font-bold">${card.text}</div><div class="text-3xl">${card.icon}</div>`;
                    div.onclick = async () => {
                        // 使用內建 UI 替代 confirm
                        if (confirm(`刪除 ${card.text}?`)) {
                            try { await deleteDoc(doc.ref); } catch (e) { console.error("Delete failed:", e); }
                        }
                    };
                    grid.appendChild(div);
                });
            }, (error) => {
                console.error("Cards listener failed:", error);
            });
        };

        const renderMainBoard = async () => {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = '<div class="col-span-10 text-center py-10 font-bold">排列字卡中...</div>';
            
            let board = new Array(40).fill(null);

            const sys = [
                {text:"我", icon:"👧"}, {text:"要", icon:"☀️"}, {text:"不要", icon:"😌"},
                {text:"你", icon:"👦"}, {text:"是", icon:"⭕"}, {text:"不是", icon:"❌"},
                {text:"他", icon:"🧒"}, {text:"會", icon:"💡"}, {text:"不會", icon:"🤯"},
                {text:"老師", icon:"👩‍🏫"}, {text:"還要", icon:"☝️"}, {text:"等一下", icon:"🖐️"}
            ];
            let sP = 0;
            for(let r=0; r<4; r++) for(let c=0; c<3; c++) board[r*10+c] = sys[sP++];

            board[9] = { text:"添加", icon:"➕", type:"act", action: () => window.switchView('categoryView') };
            board[19] = { text:"告狀", icon:"☝️👩‍🏫", type:"act", action: () => window.speak("老師，我要告狀！") };
            board[29] = { text:"幫忙", icon:"🤝❤️", type:"act", action: () => window.speak("請幫幫我。") };
            board[39] = { text:"重設", icon:"⚙️", cat: "bg-pink-100", type:"act", action: () => { selectedSentence = []; renderSentence(); window.speak("系統重設"); } };

            let currentCol = 3; 
            let currentRow = 0;

            for (let catId of selectedCategoryIds) {
                if (currentCol >= 9) break;
                const cat = allCategories.find(c => c.id === catId);
                const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', catId, 'cards');
                try {
                    const snap = await getDocs(q);
                    const cards = snap.docs.map(d => ({ ...d.data(), color: cat.color }));

                    cards.forEach(card => {
                        if (currentCol < 9) {
                            board[currentRow * 10 + currentCol] = card;
                            currentRow++;
                            if (currentRow >= 4) { currentRow = 0; currentCol++; }
                        }
                    });
                    if (currentRow !== 0) { currentRow = 0; currentCol++; }
                } catch (e) {
                    console.error("Failed to load cards for cat:", catId, e);
                }
            }
            drawBoardCells(board);
        };

        const drawBoardCells = (board) => {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = '';
            board.forEach(item => {
                const div = document.createElement('div');
                div.className = item ? "board-card" : "board-empty";
                if(item) {
                    div.style.backgroundColor = item.color || '#fff';
                    div.innerHTML = `<div class="text-xs font-black">${item.text}</div><div class="text-3xl">${item.icon}</div>`;
                    div.onclick = () => {
                        if(item.type === 'act') item.action();
                        else if(selectedSentence.length < 5) { 
                            selectedSentence.push(item); 
                            window.speak(item.text); 
                            renderSentence(); 
                        }
                    };
                }
                grid.appendChild(div);
            });
        };

        const renderSentence = () => {
            const box = document.getElementById('sentenceBox');
            box.innerHTML = '';
            selectedSentence.forEach(item => {
                const div = document.createElement('div');
                div.className = "w-16 h-20 bg-white border-2 border-black rounded-xl flex flex-col items-center justify-center flex-shrink-0";
                div.innerHTML = `<div class="text-2xl">${item.icon}</div><div class="text-[10px] font-bold">${item.text}</div>`;
                box.appendChild(div);
            });
        };

        window.analyzeAI = async () => {
            if(selectedSentence.length === 0) return;
            const text = selectedSentence.map(i => i.text).join('');
            const apiKey = "AIzaSyDCanIl68JrI9QD9YT-_oClpxovtjoW21c";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `輸入：${text}` }] }],
                        systemInstruction: { parts: [{ text: "你是一位 AAC 專家。格式：缺少【XX】-->完整句子。20字內。" }] }
                    })
                });
                const data = await res.json();
                document.getElementById('aiResult').innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "分析失敗";
                document.getElementById('aiArea').classList.remove('hidden');
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 如果是透過環境提供的 token 登入，或者點擊了使用者按鈕登入 (非匿名或有email)
                if (!user.isAnonymous || user.email) {
                    currentUser = user;
                    const q = collection(db, 'artifacts', appId, 'users', user.uid, 'categories');
                    
                    // 修正點：加入權限錯誤處理
                    onSnapshot(q, (snap) => {
                        allCategories = snap.docs.map(d => ({...d.data(), id: d.id}));
                        if(allCategories.length === 0) initDefaultData(user.uid);
                        window.switchView('categoryView');
                    }, (error) => {
                        console.error("Categories listener permission denied:", error);
                        // 如果權限失敗，我們依然讓使用者停留在登入或顯示空內容，而不是閃退
                    });
                }
            } else {
                // 自動進行基礎匿名登入以滿足環境規則，但不自動跳轉
                try { 
                    if (typeof __initial_auth_token !== 'undefined') {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth); 
                    }
                } catch (e) { console.error("Auto login failed:", e); }
                window.switchView('loginView');
            }
        });

        window.login = (email) => {
            signInWithEmailAndPassword(auth, email, "password123").catch(e => {
                console.error("Login failed:", e);
                // 模擬成功以利預覽測試
                if(e.code === 'auth/user-not-found') alert("請確認 Firebase 已建立此帳號");
            });
        };

        window.addCard = async () => {
            const name = document.getElementById('newCardName').value;
            const icon = document.getElementById('newCardIcon').value;
            if(!name || !icon || !currentUser) return;
            try {
                const ref = doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', currentEditingCategory.id, 'cards'));
                await setDoc(ref, { text: name, icon: icon, id: ref.id });
                document.getElementById('newCardName').value = '';
                document.getElementById('newCardIcon').value = '';
            } catch (e) { console.error("Add failed:", e); }
        };

    </script>
    <style>
        body { background-color: #fefce8; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .view-screen { position: fixed; inset: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .cat-card { width: 160px; height: 200px; border: 3px solid #000; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 4px 4px 0 #000; touch-action: none; }
        .edit-card-item { width: 100px; height: 120px; border: 2px solid #000; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .board-card { border: 2px solid #000; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 6px; cursor: pointer; box-shadow: 2px 2px 0 #000; transition: 0.1s; }
        .board-card:active { transform: scale(0.95); }
        .board-empty { border: 2px dashed #ccc; border-radius: 15px; opacity: 0.2; }
        .sentence-bar { background-color: #f3f4e9; border: 4px solid #6b7280; border-radius: 30px; height: 120px; display: flex; align-items: center; padding: 0 15px; gap: 10px; flex-grow: 1; overflow-x: auto; }
        .grid-10x4 { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; width: 100%; height: calc(100vh - 200px); }
    </style>
</head>
<body>

    <div id="loginView" class="view-screen">
        <h1 class="text-4xl font-black mb-10 text-blue-600 mt-20">🤖 AAC 溝通系統</h1>
        <div class="space-y-4 w-80 text-center">
            <p class="text-gray-500 font-bold mb-4">請選擇帳號進入個人板</p>
            <button onclick="login('user1@test.com')" class="w-full bg-blue-500 text-white py-5 rounded-2xl font-bold text-xl shadow-lg">使用者 A (User 1)</button>
            <button onclick="login('user2@test.com')" class="w-full bg-green-500 text-white py-5 rounded-2xl font-bold text-xl shadow-lg">使用者 B (User 2)</button>
        </div>
    </div>

    <div id="categoryView" class="view-screen hidden">
        <h2 class="text-4xl font-black mb-10">挑 選 類 別</h2>
        <div id="categoryGrid" class="flex gap-6 mb-10 overflow-x-auto p-4 max-w-full"></div>
        <div class="w-full max-w-5xl px-4">
            <p class="font-bold mb-2">已選類別：</p>
            <div class="w-full h-28 bg-[#e5e7eb] rounded-[30px] border-4 border-[#6b7280] flex items-center p-4 gap-4 relative">
                <div id="selectedBar" class="flex gap-4 overflow-x-auto overflow-y-hidden"></div>
                <button onclick="switchView('boardView')" class="absolute -right-4 bg-yellow-400 w-20 h-20 rounded-full flex items-center justify-center text-4xl shadow-xl border-4 border-white transition-transform hover:scale-110">➡️</button>
            </div>
        </div>
        <p class="mt-8 text-sm text-gray-400">長按類別圖示可進入編輯模式</p>
    </div>

    <div id="editCategoryView" class="view-screen hidden">
        <h2 id="editTitle" class="text-3xl font-black mb-6">編輯類別</h2>
        <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-gray-200 w-full max-w-4xl">
            <div id="editCardsGrid" class="grid grid-cols-6 gap-4 mb-6"></div>
            <div class="flex gap-2 border-t pt-4">
                <input id="newCardName" placeholder="名稱" class="flex-1 border p-3 rounded-xl outline-none focus:ring-2 ring-yellow-300">
                <input id="newCardIcon" placeholder="Emoji" class="w-24 border p-3 rounded-xl outline-none text-center">
                <button onclick="addCard()" class="bg-yellow-400 px-6 rounded-xl font-bold">新增字卡</button>
            </div>
        </div>
        <button onclick="switchView('categoryView')" class="mt-8 bg-red-500 text-white px-10 py-4 rounded-full font-bold shadow-lg">返回挑選</button>
    </div>

    <div id="boardView" class="view-screen hidden">
        <div class="flex w-full gap-4 mb-4 max-w-[1400px]">
            <button onclick="analyzeAI()" class="w-24 h-24 bg-blue-100 rounded-full border-4 border-blue-400 text-5xl shadow-md hover:bg-blue-200 transition-colors">🤖</button>
            <div class="flex-grow flex flex-col">
                <div id="sentenceBox" class="sentence-bar"></div>
                <div id="aiArea" class="hidden mt-2 p-2 bg-blue-50 border border-blue-200 rounded-xl text-blue-700 font-bold italic animate-pulse">
                    AI 建議：<span id="aiResult"></span>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="selectedSentence.pop(); renderSentence();" class="w-12 h-12 bg-red-500 text-white rounded-full text-2xl font-black flex items-center justify-center shadow">✕</button>
                <button onclick="window.speak(selectedSentence.map(i=>i.text).join(''))" class="w-12 h-12 bg-orange-400 text-white rounded-full text-2xl flex items-center justify-center shadow">📢</button>
                <button onclick="switchView('categoryView')" class="w-12 h-12 bg-gray-400 text-white rounded-full text-xs font-bold shadow">返回</button>
            </div>
        </div>
        <div id="boardGrid" class="grid-10x4 px-4 max-w-[1400px]"></div>
    </div>

</body>
</html>
